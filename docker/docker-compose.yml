services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: trillian
      MYSQL_DATABASE: trillian
      MYSQL_USER: trillian
      MYSQL_PASSWORD: trillian
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "trillian", "-ptrillian"]
      interval: 5s
      timeout: 5s
      retries: 30

  trillian-log-server:
    image: gcr.io/trillian-opensource-ci/log_server
    command:
      - --mysql_uri=trillian:trillian@tcp(mysql:3306)/trillian
      - --rpc_endpoint=0.0.0.0:8090
      - --http_endpoint=0.0.0.0:8091
      - --alsologtostderr
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8090:8090"
      - "8091:8091"

  trillian-log-signer:
    image: gcr.io/trillian-opensource-ci/log_signer
    command:
      - --mysql_uri=trillian:trillian@tcp(mysql:3306)/trillian
      - --rpc_endpoint=0.0.0.0:8092
      - --http_endpoint=0.0.0.0:8093
      - --force_master
      - --alsologtostderr
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
