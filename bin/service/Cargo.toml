[package]
name = "arbor-service"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "arbor-service-bin"
path = "src/main.rs"

[dependencies]
arbor-core = { path = "../../crates/core" }
arbor-server = { path = "../../crates/server" }
arbor-trillian = { path = "../../crates/trillian" }
arbor-store = { path = "../../crates/store" }
arbor-verify = { path = "../../crates/verify" }
guest = { package = "arbor-guest", path = "../../crates/guest" }
jolt-sdk = { workspace = true, features = ["host"] }

tonic = "0.12"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
serde_json = "1"
